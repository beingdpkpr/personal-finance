<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <script>
      // Single-page app redirect for GitHub Pages
      // Redirects 404s back to index.html preserving the path in the query string
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 2).join('/') +
        '/?p=' + l.pathname.slice(1).replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
</html>
